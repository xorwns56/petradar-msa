# ===========================================
# Grafana 대시보드 자동 프로비저닝
# /var/lib/grafana/dashboards/ 에서 JSON 파일 로드
# ===========================================

apiVersion: 1

providers:
  - name: 'PetRadar'
    orgId: 1
    folder: 'PetRadar'
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
