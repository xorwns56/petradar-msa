# ===========================================
# Grafana 데이터소스 자동 프로비저닝
# Grafana 시작 시 Prometheus + Loki를 자동 등록
# ===========================================

apiVersion: 1

datasources:
  # Prometheus - 메트릭 데이터소스 (CPU, 메모리, HTTP 요청 등)
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  # Loki - 로그 데이터소스 (서비스 로그 검색/필터링)
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
