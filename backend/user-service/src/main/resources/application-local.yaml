server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/user_db
    username: postgres
    password: 1234
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
  kafka:
    bootstrap-servers: localhost:9092

# 로그 파일 출력 설정 (Promtail이 수집)
logging:
  file:
    path: ./logs
    name: ./logs/user-service.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 3

jwt:
  secret: petradar-secret-key-must-be-at-least-256-bits-long-for-hs256

management:
  tracing:
    sampling:
      probability: 1.0  # 로컬에서는 모든 요청 추적
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
