spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/user_db
    username: postgres
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: redis
  kafka:
    bootstrap-servers: kafka:9092

jwt:
  secret: ${JWT_SECRET}

management:
  tracing:
    sampling:
      probability: 0.1  # 프로덕션에서는 10%만 추적
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
