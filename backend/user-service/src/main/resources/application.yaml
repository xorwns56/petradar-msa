spring:
  application:
    name: user-service
  profiles:
    active: local
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# JWT 만료시간은 환경 무관하게 동일
jwt:
  access-expiration: 600000     # Access Token 만료시간 10분 (ms)
  refresh-expiration: 86400000  # Refresh Token 만료시간 24시간 (ms)

# SpringDoc Swagger UI 설정
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    prometheus:
      enabled: true
