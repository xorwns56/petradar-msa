# ===========================================
# 로컬 개발환경 설정
# 추후 k8s 배포 시 application-k8s.yaml에서 오버라이드
# ===========================================

spring:
  cloud:
    gateway:
      routes:
        # user-service: 인증 + 사용자 관리
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**, /api/user/**

        # report-service: 실종신고 + 목격제보 + 알림
        - id: report-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/missing/**, /api/report/**, /api/notification/**

        # search-service: 이미지/텍스트 유사도 검색
        - id: search-service
          uri: http://localhost:8000
          predicates:
            - Path=/api/search/**

        # report-service WebSocket: 실시간 알림 (SockJS + STOMP)
        # SockJS는 HTTP 핸드셰이크(/api/ws/info) 후 WebSocket 업그레이드하므로 http:// 사용
        - id: report-service-ws
          uri: http://localhost:8082
          predicates:
            - Path=/api/ws/**

# 로그 파일 출력 설정 (Promtail이 수집)
logging:
  file:
    path: ./logs
    name: ./logs/gateway-service.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 3

# JWT 설정 (user-service와 동일한 시크릿 키 사용)
jwt:
  secret: petradar-secret-key-must-be-at-least-256-bits-long-for-hs256

# -----------------------------------------
# Zipkin 분산 추적 설정 (로컬)
# -----------------------------------------
management:
  tracing:
    sampling:
      probability: 1.0  # 로컬에서는 모든 요청 추적 (프로덕션에서는 0.1 등으로 낮춤)
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans  # 로컬 Zipkin 서버 주소
