spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://user-service:8080
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1
        - id: report-service
          uri: http://report-service:8080
          predicates:
            - Path=/api/reports/**
          filters:
            - StripPrefix=1
        - id: search-service
          uri: http://search-service:8000
          predicates:
            - Path=/api/search/**
          filters:
            - StripPrefix=1

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
