spring:
  cloud:
    gateway:
      routes:
        # user-service: 인증 + 사용자 관리
        - id: user-service
          uri: http://user-service:8080
          predicates:
            - Path=/api/auth/**, /api/user/**

        # report-service: 실종신고 + 목격제보 + 알림
        - id: report-service
          uri: http://report-service:8080
          predicates:
            - Path=/api/missing/**, /api/report/**, /api/notification/**

        # search-service: 이미지/텍스트 유사도 검색
        - id: search-service
          uri: http://search-service:8000
          predicates:
            - Path=/api/search/**

        # report-service WebSocket: 실시간 알림 (SockJS + STOMP)
        # SockJS는 HTTP 핸드셰이크(/api/ws/info) 후 WebSocket 업그레이드하므로 http:// 사용
        - id: report-service-ws
          uri: http://report-service:8080
          predicates:
            - Path=/api/ws/**

# JWT 설정 (user-service와 동일한 시크릿 키 사용)
jwt:
  secret: ${JWT_SECRET}

management:
  tracing:
    sampling:
      probability: 0.1  # 프로덕션에서는 10%만 추적
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
