spring:
  application:
    name: report-service
  profiles:
    active: local
  kafka:
    consumer:
      group-id: report-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.xorwns56.report.kafka"

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus  # prometheus 엔드포인트 노출
  endpoint:
    prometheus:
      enabled: true  # /actuator/prometheus 활성화
