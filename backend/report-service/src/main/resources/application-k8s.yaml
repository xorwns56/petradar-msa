spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/report_db
    username: postgres
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: redis
  kafka:
    bootstrap-servers: kafka:9092

# MinIO 설정
minio:
  endpoint: http://minio:9000
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: pet-images

# FeignClient 대상 서비스 주소
client:
  user-service:
    url: http://user-service
  search-service:
    url: http://search-service

management:
  tracing:
    sampling:
      probability: 0.1  # 프로덕션에서는 10%만 추적
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
