server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/report_db
    username: postgres
    password: 1234
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
  kafka:
    bootstrap-servers: localhost:9092

# MinIO 설정
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: pet-images

# FeignClient 대상 서비스 주소
client:
  user-service:
    url: http://localhost:8081
  search-service:
    url: http://localhost:8000

management:
  tracing:
    sampling:
      probability: 1.0  # 로컬에서는 모든 요청 추적
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
