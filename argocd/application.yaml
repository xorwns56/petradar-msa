apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: petradar
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/xorwns56/petradar.git
    targetRevision: main
    path: k8s
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: petradar
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
