version: '3.8'

services:
  # ===========================================
  # PostgreSQL - 서비스별 스키마 분리
  # pgvector 확장 포함 이미지 사용 (이미지 유사도 검색)
  # 접속: localhost:5432
  # 스키마: user_db / report_db / search_db
  # ===========================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    ports:
      - "5432:5432"                          # 호스트:컨테이너 포트 매핑
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    volumes:
      - postgres-data:/var/lib/postgresql/data                         # 데이터 영속성 보장
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql  # DB/스키마 초기화 스크립트
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # pgAdmin - PostgreSQL 웹 기반 관리 도구
  # 접속: http://localhost:5050 (admin@admin.com / admin)
  # ===========================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres                             # PostgreSQL이 먼저 실행된 후 시작
    volumes:
      - pgadmin-data:/var/lib/pgadmin        # 대시보드 설정 유지

  # ===========================================
  # Redis - Refresh Token 저장 + WebSocket Pub/Sub
  # Refresh Token: refresh:{userId} (TTL 24h)
  # WebSocket: 스케일 아웃 시 인스턴스 간 메시지 브로드캐스트
  # 접속: localhost:6379
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data                     # 데이터 영속성 보장

  # ===========================================
  # Kafka - KRaft 모드 (Zookeeper 없이 실행)
  # Kafka 2.8.0+ 부터 지원하는 자체 메타데이터 관리 방식
  # topic: user-deleted (회원 탈퇴 이벤트)
  # 접속: localhost:9092
  # ===========================================
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller              # KRaft: broker + controller 역할 통합
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1          # 단일 브로커 환경에서는 1로 설정
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk               # KRaft 모드 필수 클러스터 ID
    volumes:
      - kafka-data:/var/lib/kafka/data

  # ===========================================
  # Prometheus - 메트릭 수집 서버
  # 접속: http://localhost:9090
  # Spring Boot Actuator에서 노출한 메트릭을 주기적으로 수집
  # ===========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"                          # Prometheus 웹 UI 포트
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml  # 수집 대상 설정 파일 마운트
      - prometheus-data:/prometheus                                         # 수집한 메트릭 데이터 저장소
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'  # 설정 파일 경로 지정
      - '--storage.tsdb.path=/prometheus'               # 시계열 데이터 저장 경로

  # ===========================================
  # Grafana - 메트릭 시각화 대시보드
  # 접속: http://localhost:3001 (admin/admin)
  # Prometheus 데이터를 그래프/차트로 시각화
  # ===========================================
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"                          # Grafana 기본 3000 → 3001로 변경
    environment:
      - GF_SECURITY_ADMIN_USER=admin         # 관리자 계정
      - GF_SECURITY_ADMIN_PASSWORD=admin     # 관리자 비밀번호 (개발용)
    volumes:
      - grafana-data:/var/lib/grafana        # 대시보드 설정, 데이터소스 설정 유지
    depends_on:
      - prometheus                           # Prometheus가 먼저 실행되어야 데이터소스 연결 가능

  # ===========================================
  # Zipkin - 분산 추적 시스템
  # 접속: http://localhost:9411
  # MSA 환경에서 서비스 간 API 호출 흐름 및 지연시간 분석
  # ===========================================
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    ports:
      - "9411:9411"                          # Zipkin 웹 UI 및 API 포트

# ===========================================
# Named Volumes - 컨테이너 삭제해도 데이터 보존
# docker volume ls 로 확인 가능
# ===========================================
volumes:
  postgres-data:    # PostgreSQL 데이터 저장
  pgadmin-data:     # pgAdmin 설정 저장
  redis-data:       # Redis 데이터 저장
  kafka-data:       # Kafka 데이터 저장
  prometheus-data:  # Prometheus 메트릭 데이터 저장
  grafana-data:     # Grafana 대시보드/설정 저장
