services:
  # ===========================================
  # PostgreSQL - 서비스별 스키마 분리
  # pgvector 확장 포함 이미지 사용 (이미지 유사도 검색)
  # 접속: localhost:5432
  # 스키마: user_db / report_db / search_db
  # ===========================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    ports:
      - "5432:5432"                          # 호스트:컨테이너 포트 매핑
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    volumes:
      - postgres-data:/var/lib/postgresql/data                         # 데이터 영속성 보장
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql  # DB/스키마 초기화 스크립트
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Redis - Refresh Token 저장 + WebSocket Pub/Sub
  # Refresh Token: refresh:{userId} (TTL 24h)
  # WebSocket: 스케일 아웃 시 인스턴스 간 메시지 브로드캐스트
  # 접속: localhost:6379
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data                     # 데이터 영속성 보장

  # ===========================================
  # MinIO - 이미지 파일 스토리지
  # 접속: http://localhost:9001 (minioadmin / minioadmin)
  # API: localhost:9000
  # ===========================================
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"   # API 포트
      - "9001:9001"   # 웹 콘솔 포트
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  # ===========================================
  # Kafka - KRaft 모드 (Zookeeper 없이 실행)
  # Kafka 2.8.0+ 부터 지원하는 자체 메타데이터 관리 방식
  # topic: user-deleted (회원 탈퇴 이벤트)
  # 접속: localhost:9092
  # ===========================================
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller              # KRaft: broker + controller 역할 통합
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1          # 단일 브로커 환경에서는 1로 설정
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk               # KRaft 모드 필수 클러스터 ID
    volumes:
      - kafka-data:/var/lib/kafka/data

# ===========================================
# Named Volumes - 컨테이너 삭제해도 데이터 보존
# docker volume ls 로 확인 가능
# ===========================================
volumes:
  postgres-data:    # PostgreSQL 데이터 저장
  redis-data:       # Redis 데이터 저장
  kafka-data:       # Kafka 데이터 저장
  minio-data:       # MinIO 이미지 저장
