# =============================================================================
# secrets-example.yaml - 시크릿 값 템플릿
# 이 파일을 복사해서 secrets.yaml을 만들고 실제 값을 채워넣으세요.
# secrets.yaml은 .gitignore에 추가해서 git에 올리지 마세요.
#
# 사용법:
#   cp k8s/secrets-example.yaml k8s/secrets.yaml
#   # secrets.yaml에 실제 값 입력 후
#   helm install petradar ./k8s -f k8s/secrets.yaml
# =============================================================================

postgres:
  password: "your-postgres-password"

jwtSecret: "your-jwt-secret-must-be-at-least-256-bits-long-for-hs256"

minio:
  accessKey: "your-minio-access-key"
  secretKey: "your-minio-secret-key"
