apiVersion: v1
kind: Service
metadata:
  name: search-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "petradar.labels" . | nindent 4 }}
    app: search-service
spec:
  selector:
    app: search-service
  ports:
    - port: {{ .Values.searchService.port }}
      targetPort: {{ .Values.searchService.port }}
