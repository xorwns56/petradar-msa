apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "petradar.labels" . | nindent 4 }}
    app: gateway-service
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: {{ include "petradar.image" (list . "gateway-service") }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.gateway.port }}
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            # JWT 시크릿 - gateway가 토큰 검증 담당
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: jwt-secret
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: {{ .Values.gateway.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ .Values.gateway.port }}
            initialDelaySeconds: 60
            periodSeconds: 30
