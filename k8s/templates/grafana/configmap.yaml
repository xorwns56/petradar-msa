# ===========================================
# Grafana 설정 ConfigMap
# 데이터소스 + 대시보드 프로비저닝 설정
# ===========================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "petradar.labels" . | nindent 4 }}
data:
  # Prometheus + Loki 데이터소스 자동 등록
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:{{ .Values.prometheus.port }}
        isDefault: true
      - name: Loki
        type: loki
        access: proxy
        url: http://loki:{{ .Values.loki.port }}

  # 대시보드 파일 프로비저닝 설정
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: 'PetRadar'
        orgId: 1
        folder: 'PetRadar'
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
