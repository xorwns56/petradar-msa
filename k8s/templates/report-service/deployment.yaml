apiVersion: apps/v1
kind: Deployment
metadata:
  name: report-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "petradar.labels" . | nindent 4 }}
    app: report-service
spec:
  replicas: {{ .Values.reportService.replicas }}
  selector:
    matchLabels:
      app: report-service
  template:
    metadata:
      labels:
        app: report-service
    spec:
      containers:
        - name: report-service
          image: {{ include "petradar.image" (list . "report-service") }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.reportService.port }}
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: spring-datasource-password
            # MinIO 인증 정보 (이미지 업로드/조회에 필요)
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: minio-access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: minio-secret-key
          resources:
            {{- toYaml .Values.reportService.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: {{ .Values.reportService.port }}
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ .Values.reportService.port }}
            initialDelaySeconds: 90
            periodSeconds: 30
