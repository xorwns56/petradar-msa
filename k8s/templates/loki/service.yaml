# ===========================================
# Loki Service
# 클러스터 내부에서 loki:3100 으로 접근
# ===========================================
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "petradar.labels" . | nindent 4 }}
    app: loki
spec:
  selector:
    app: loki
  ports:
    - port: {{ .Values.loki.port }}
      targetPort: {{ .Values.loki.port }}
